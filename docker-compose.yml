services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chipping}
      POSTGRES_USER: ${POSTGRES_USER:-chipping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chipping}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chipping}:${POSTGRES_PASSWORD:-chipping}@db:5432/${POSTGRES_DB:-chipping}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
