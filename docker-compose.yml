services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chipping}
      POSTGRES_USER: ${POSTGRES_USER:-chipping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chipping}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chipping}:${POSTGRES_PASSWORD:-chipping}@db:5432/${POSTGRES_DB:-chipping}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      OWNER_PIN: ${OWNER_PIN:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
